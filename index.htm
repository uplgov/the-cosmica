<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cosmica</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
    --bg-color: #ffffff;
    --text-color: #1a1a1a;
    --gold: #c5a059;
    --nav-bg: rgba(255, 255, 255, 0.9);
    --border-color: #e0e0e0;
    --btn-text: #ffffff;
    --btn-bg: #1a1a1a;
}
[data-theme="dark"] {
    --bg-color: #0f1115;
    --text-color: #f4f4f4;
    --gold: #d4af37;
    --nav-bg: rgba(15, 17, 21, 0.9);
    --border-color: #333333;
    --btn-text: #0f1115;
    --btn-bg: #d4af37;
}
body {
    margin: 0;
    padding: 0;
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: background-color 0.4s ease, color 0.4s ease;
    overflow-x: hidden;
}
a {
    text-decoration: none;
    color: inherit;
    transition: color 0.3s ease;
}
a:hover {
    color: var(--gold);
}
header {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background-color: var(--nav-bg);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-color);
    z-index: 1000;
    box-sizing: border-box;
}
.logo-container img {
    height: 50px;
    border-radius: 4px;
}
nav {
    display: flex;
    gap: 30px;
    font-size: 1.1rem;
    font-weight: 700;
}
.header-controls {
    display: flex;
    align-items: center;
    gap: 15px;
}
select {
    background: transparent;
    color: var(--text-color);
    border: 1px solid var(--border-color);
    padding: 5px 10px;
    font-family: inherit;
    border-radius: 4px;
    cursor: pointer;
}
select option {
    background: var(--bg-color);
    color: var(--text-color);
}
#theme-btn {
    background: transparent;
    border: 1px solid var(--text-color);
    color: var(--text-color);
    padding: 5px 15px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s;
}
#theme-btn:hover {
    background: var(--text-color);
    color: var(--bg-color);
}
.hero {
    margin-top: 80px;
    padding: 60px 20px;
    text-align: center;
}
.hero img {
    max-width: 90%;
    width: 1000px;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.hero p {
    max-width: 800px;
    margin: 40px auto;
    font-size: 1.25rem;
    line-height: 1.8;
}
.btn {
    display: inline-block;
    padding: 12px 30px;
    background-color: var(--btn-bg);
    color: var(--btn-text);
    border: 1px solid var(--btn-bg);
    border-radius: 4px;
    font-size: 1.1rem;
    transition: all 0.3s;
}
.btn:hover {
    background-color: transparent;
    color: var(--text-color);
    border-color: var(--text-color);
}
.chef {
    padding: 80px 20px;
    text-align: center;
    background-color: rgba(0,0,0,0.02);
}
[data-theme="dark"] .chef {
    background-color: rgba(255,255,255,0.02);
}
.chef img {
    max-width: 80%;
    width: 400px;
    border-radius: 50%;
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.chef h2 {
    font-size: 2rem;
    margin-bottom: 30px;
    font-style: italic;
}
.explore {
    padding: 80px 20px;
    text-align: center;
}
.explore h2 {
    font-size: 2.5rem;
    margin-bottom: 50px;
}
.explore-grid {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}
footer {
    text-align: center;
    padding: 40px 20px;
    border-top: 1px solid var(--border-color);
    font-size: 0.9rem;
    opacity: 0.8;
}
.footer-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
#modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: var(--bg-color);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}
.modal-content {
    text-align: center;
}
.modal-content h1 {
    margin-bottom: 30px;
    font-size: 2rem;
}
.lang-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}
.lang-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-color);
    padding: 10px 20px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
}
.lang-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
}
@media (max-width: 768px) {
    header {
        flex-direction: column;
        padding: 15px;
    }
    nav {
        margin: 15px 0;
        flex-wrap: wrap;
        justify-content: center;
    }
    .lang-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>
<body>
<div id="modal-overlay">
    <div class="modal-content">
        <h1>The Cosmica</h1>
        <div class="lang-grid" id="modal-langs">
        </div>

    <div class="header-controls">

        <button id="theme-btn" data-i18n="theme">THEME</button>

<main>
    <section class="hero">
        <img src="http://uplgov.github.io/the-cosmica/images/Copilot_29890430_135119.png" alt="The Cosmica Dish">
        <p data-i18n="hero_desc">自2667年起,当第一缕黄油与迷迭香的香气飘散在这条街巷,The Cosmica便开始了它对“极致味觉”的不懈探索。三百五十二载光阴荏苒,我们并非仅仅在烹饪食物,而是在用匠心复刻时间。</p>
        <a href="https://uplgov.github.io/the-cosmica/story.htm" class="btn" data-i18n="hero_btn">了解永恒的传奇故事</a>
    </section>
    <section class="chef">

        <a href="https://uplgov.github.io/the-cosmica/chief.htm" class="btn" data-i18n="chef_btn">了解食材守护者</a>

    <section class="explore">
        <h2 data-i18n="explore_title">开始你的探索</h2>
        <div class="explore-grid">
            <a href="https://uplgov.github.io/the-cosmica/menu.htm" class="btn" data-i18n="explore_btn1">The Cosmica传承</a>
            <a href="https://uplgov.github.io/the-cosmica/menu1.htm" class="btn" data-i18n="explore_btn2">即兴发挥</a>
            <a href="https://uplgov.github.io/the-cosmica/story1.htm" class="btn" data-i18n="explore_btn3">了解食材</a>
        </div>
    </section>
</main>
<footer>
    <div class="footer-links">
        <a href="https://uplgov.github.io/the-cosmica/privacy.htm" data-i18n="footer_privacy">隐私细节</a>
        <a href="https://uplgov.github.io/the-cosmica/licence.htm">Licence</a>
        <a href="https://uplgov.github.io/sixside/police/">Sixside Police Department</a>
    </div>
    <p>© 2667-3019 The Cosmica Cooperation (Sixside)</p>

const modalLangs = document.getElementById('modal-langs');
const headerLang = document.getElementById('header-lang');
const modalOverlay = document.getElementById('modal-overlay');
const themeBtn = document.getElementById('theme-btn');

Object.keys(i18n).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.textContent = i18n[key].name;
    btn.onclick = () => setLanguage(key);
    modalLangs.appendChild(btn);

    const option = document.createElement('option');
    option.value = key;
    option.textContent = i18n[key].name;
    if (key === 'zh-cn') option.selected = true;
    headerLang.appendChild(option);
});

function setLanguage(lang) {
    const t = i18n[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
    });
    headerLang.value = lang;
    modalOverlay.style.opacity = '0';
    setTimeout(() => {
        modalOverlay.style.display = 'none';
        document.body.style.overflowY = 'auto';
    }, 500);
}

headerLang.addEventListener('change', (e) => {
    setLanguage(e.target.value);
});

let isDark = false;
themeBtn.addEventListener('click', () => {
    isDark = !isDark;
    if (isDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.removeAttribute('data-theme');
    }
});

document.body.style.overflowY = 'hidden';
